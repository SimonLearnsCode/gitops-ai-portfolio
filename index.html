<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio & AI Recruiter Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>

    <div class="app-container">
        <aside class="profile-sidebar" aria-label="Profile Summary">
            <div class="profile-card" id="profile-card-target">
                <div class="skeleton-line" style="width: 60%; height: 2rem; margin-bottom: 1rem;"></div>
                <div class="skeleton-line" style="width: 40%; height: 1.2rem; margin-bottom: 2rem;"></div>
                <div class="skeleton-line" style="width: 90%; height: 4rem;"></div>
            </div>
        </aside>

        <main class="content-feed">
            <section class="glass-section" aria-labelledby="skills-heading">
                <h2 id="skills-heading" class="section-title">Technical Expertise</h2>
                <div class="skills-grid" id="skills-grid-target">
                    </div>
            </section>

            <section class="glass-section" aria-labelledby="exp-heading">
                <h2 id="exp-heading" class="section-title">Professional History</h2>
                <div class="timeline" id="timeline-target">
                    </div>
            </section>

            <section class="glass-section" aria-labelledby="projects-heading">
                <h2 id="projects-heading" class="section-title">Engineered Ecosystems</h2>
                <div class="projects-grid" id="projects-target">
                    </div>
            </section>
        </main>
    </div>

    <div class="ai-agent-widget" id="ai-agent-widget">
        <button class="ai-trigger-pill" id="ai-trigger" aria-label="Open Smart Recruiter AI Agent">
            <span class="pulse-indicator"></span>
            <span class="pill-text">Talk to AI Recruiter</span>
            <svg class="pill-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
        </button>

        <div class="ai-chat-window" id="ai-chat-window" aria-hidden="true">
            <header class="chat-header">
                <div class="chat-header-info">
                    <h3>Smart Recruiter AI</h3>
                    <span class="chat-status">Context: Profile Data Active</span>
                </div>
                <button class="chat-close-btn" id="ai-close" aria-label="Close Chat Window">&times;</button>
            </header>

            <div class="chat-messages" id="chat-messages-target">
                <div class="message system-msg">
                    Hi! I am the candidate's custom AI agent. Ask me anything about their tech stack, architectural history, or availability!
                </div>
            </div>

            <div class="chips-container" id="chips-container-target">
                <button class="prompt-chip" data-prompt="What is their primary technical stack?">View Tech Stack</button>
                <button class="prompt-chip" data-prompt="Are they open to work? What roles are they seeking?">Are they open to work?</button>
                <button class="prompt-chip" data-prompt="Detail a notable project where they saved company costs or optimized velocity.">Key Achievements</button>
            </div>

            <form class="chat-input-area" id="chat-form">
                <input type="text" id="chat-input" placeholder="Ask about the candidate..." autocomplete="off" required aria-label="Message to AI recruiter">
                <button type="submit" class="chat-send-btn" aria-label="Send Message">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/ai-agent.js"></script>
</body>
</html>
